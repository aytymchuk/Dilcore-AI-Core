name: 📦 Reusable Build & Push Container App

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      tag_name:
        required: false
        type: string
        default: "ai-agent"
      version_bump_type:
        required: false
        type: string
        default: "patch"
    outputs:
      image_tag:
        description: "The canonical image tag"
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      version:
        description: "The calculated semantic version"
        value: ${{ jobs.build-and-push.outputs.version }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_name.outputs.canonical_tag }}
      version: ${{ steps.calculate_version.outputs.tag }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Calculate Version
        id: calculate_version
        uses: ./.github/actions/git-version-manager
        with:
          mode: 'calculate'
          tag-name: ${{ inputs.tag_name }}
          bump-type: ${{ inputs.version_bump_type }}

      - name: 🖊️ Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="${{ steps.calculate_version.outputs.tag }}"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: 🔐 Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔠 Lowercase Image Name
        id: image_name
        run: |
          LOWER_NAME=${GITHUB_REPOSITORY,,}
          echo "IMAGE_NAME=$LOWER_NAME" >> $GITHUB_ENV
          CANONICAL="${{ env.REGISTRY }}/$LOWER_NAME:${{ steps.calculate_version.outputs.tag }}"
          echo "canonical_tag=$CANONICAL" >> $GITHUB_OUTPUT

      - name: 🐳 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.calculate_version.outputs.tag }}
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🧰 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.calculate_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
