name: 🚀 CI AI Agent

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build-and-test:
    name: 🧪 Build & Test

    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v6

    - name: 📦 Setup uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        version: "latest"

    - name: 🐍 Setup Python
      uses: actions/setup-python@v6
      with:
        python-version-file: "pyproject.toml"

    - name: 📦 Install dependencies
      run: |
        uv sync --locked --all-extras --dev

    - name: 🎨 Check Formatting
      run: |
        uv run poe format

    - name: 🔍 Lint with Ruff
      if: success() || failure()
      run: |
        uv run poe lint

    - name: 📝 Typecheck with Mypy
      if: success() || failure()
      run: |
        uv run poe typecheck

    - name: ✅ Unit Tests
      id: pytest
      if: success() || failure()
      run: |
        mkdir -p TestResults
        uv run pytest \
          -v \
          --cov=src \
          --cov-report=xml:TestResults/coverage.xml \
          --junitxml=TestResults/junit.xml

    - name: 🔌 Integration Tests
      id: pytest-integration
      if: success() || failure()
      run: |
        uv run pytest -m integration \
          -v \
          --junitxml=TestResults/junit-integration.xml

    - name: 📊 Generate Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@v5.5.1
      if: always() && steps.pytest.outcome != 'skipped'
      with:
        reports: 'TestResults/coverage.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummaryGithub'

    - name: 📝 Add Coverage Summary
      if: always() && steps.pytest.outcome != 'skipped'
      run: |
        if [ -f coveragereport/SummaryGithub.md ]; then
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No coverage summary found." >> $GITHUB_STEP_SUMMARY
        fi

    - name: 📤 Upload Coverage Report
      uses: actions/upload-artifact@v7
      if: always() && steps.pytest.outcome != 'skipped'
      with:
        name: coverage-report
        path: coveragereport

    - name: 📋 Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && steps.pytest.outcome != 'skipped'
      with:
        files: 'TestResults/junit*.xml'

    - name: 📤 Upload Test Results
      uses: actions/upload-artifact@v7
      if: always() && steps.pytest.outcome != 'skipped'
      with:
        name: test-results
        path: TestResults

  docker-build:
    name: 🐳 Docker Build Verification
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-agent:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
